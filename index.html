<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DARKMODDAYY MAX LEVEL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  background:#000;
  color:#00ffff;
  font-family:Arial;
  text-align:center;
}
.box{
  margin:40px auto;
  padding:20px;
  width:90%;
  max-width:500px;
  border:2px solid #00ffff;
  box-shadow:0 0 25px #00ffff;
}
button{
  padding:15px 30px;
  background:#00ffff;
  border:none;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px #00ffff;
}
input,textarea{
  width:90%;
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<!-- USER PANEL -->
<div id="userBox" class="box">
<h1>🎁 NHẬN ACC VIP</h1>
<h2 id="totalAcc">Đang tải...</h2>
<button onclick="nhanAcc()">NHẬN ACC</button>
<h2 id="status"></h2>
  <div class="tyle">
  <p> đăng nhập bằng garena </p>
  <p> acc liên quân vip</p>
  <p> 95% nhận được acc có skin SS-SSS</p>
  <p> bấm nhận acc để lấy acc liên quân cực vip</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminBox" style="display:none">

<div class="box">
<h2>🔐 ADMIN LOGIN</h2>
<input type="password" id="pass">
<button onclick="login()">Đăng nhập</button>
<h3 id="msg"></h3>
</div>

<div id="panel" style="display:none">

<div class="box">
<h2>📦 Thêm acc</h2>
<input id="accInput">
<button onclick="addAcc()">Thêm</button>

<textarea id="bulk" placeholder="Import mỗi dòng 1 acc"></textarea>
<button onclick="importAcc()">IMPORT</button>
</div>

<div class="box">
<h2>📋 Danh sách acc</h2>
<ul id="list"></ul>
<h3>Tổng: <span id="total"></span></h3>
</div>

<div class="box">
👥 Online: <span id="online"></span>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, get, set, remove, push, onValue, onDisconnect }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyCNeMxQYCA3C58k1RtC4XyKayQnk-xYxkg",
  databaseURL:"https://tangaccfreevip-2f58c-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

/* ======================
   ADMIN SECRET URL
====================== */
const params = new URLSearchParams(window.location.search);
if(params.get("darkmod")==="vipadmin"){
  document.getElementById("adminBox").style.display="block";
  document.getElementById("userBox").style.display="none";
}

/* ======================
   DEVICE ID
====================== */
const device = localStorage.getItem("device") || crypto.randomUUID();
localStorage.setItem("device",device);

/* ======================
   ONLINE TRACK
====================== */
const onlineRef = ref(db,"online/"+device);
set(onlineRef,true);
onDisconnect(onlineRef).remove();

/* ======================
   TOTAL ACC REALTIME
====================== */
onValue(ref(db,"accounts"),snap=>{
  document.getElementById("totalAcc").innerHTML =
  "📦 Acc còn: " + (snap.size || 0);
});

/* ======================
   NHẬN ACC (FIX LINK4M)
====================== */
window.nhanAcc = async function(){

  const status = document.getElementById("status");
  status.innerHTML="⏳ Đang chuyển hướng Link4m...";

  const baseUrl = window.location.origin + window.location.pathname;

  if(!window.location.search.includes("done=1")){
    const link4m =
    "https://link4m.co/st?api=69100b1afc003f0eba59c189&url=" +
    encodeURIComponent(baseUrl + "?done=1");

    localStorage.setItem("waiting","1");
    window.location.href = link4m;
    return;
  }

  if(localStorage.getItem("waiting")!=="1") return;
  localStorage.removeItem("waiting");

  /* ===== CHECK 2 ACC / DAY ===== */
  const today = new Date().toISOString().slice(0,10);
  const userRef = ref(db,"users/"+device);
  const snap = await get(userRef);
  let data = snap.val() || {count:0,date:today};

  if(data.date!==today){
    data.count=0;
    data.date=today;
  }

  if(data.count>=2){
    status.innerHTML="❌ Hôm nay đã nhận 2 acc";
    return;
  }

  /* ===== RANDOM ACC ===== */
  const accSnap = await get(ref(db,"accounts"));

  if(!accSnap.exists()){
    status.innerHTML="🔥 HẾT ACC 🔥";
    return;
  }

  const list = accSnap.val();
  const keys = Object.keys(list);
  const rand = keys[Math.floor(Math.random()*keys.length)];
  const acc = list[rand];

  await remove(ref(db,"accounts/"+rand));

  data.count++;
  await set(userRef,data);

  status.innerHTML="✅ "+acc;

  /* ===== TELEGRAM NOTIFY ===== */
  fetch(`https://api.telegram.org/botYOUR_TOKEN/sendMessage?chat_id=YOUR_CHAT_ID&parse_mode=html&text=
<b>🎁 DARKMODDAYY</b>%0A
👤 Device: <code>${device}</code>%0A
🔑 Acc: <code>${acc}</code>%0A
⏰ ${new Date().toLocaleString()}
`);

};

/* ======================
   ADMIN LOGIN
====================== */
let fail=0;
window.login=function(){
  if(document.getElementById("pass").value==="123456"){
    document.getElementById("panel").style.display="block";
    loadAdmin();
  }else{
    fail++;
    document.getElementById("msg").innerHTML="❌ Sai mật khẩu";
    if(fail>=5){
      document.getElementById("msg").innerHTML="🔒 Khóa 5 phút";
      setTimeout(()=>fail=0,300000);
    }
  }
};

/* ======================
   ADMIN LOAD
====================== */
function loadAdmin(){

  onValue(ref(db,"accounts"),snap=>{
    let html="";
    let total=0;
    snap.forEach(i=>{
      total++;
      html+=`<li>${i.val()} 
      <button onclick="delAcc('${i.key}')">X</button></li>`;
    });
    document.getElementById("list").innerHTML=html;
    document.getElementById("total").innerHTML=total;
  });

  onValue(ref(db,"online"),snap=>{
    document.getElementById("online").innerHTML=snap.size||0;
  });
}

window.addAcc=function(){
  const val=document.getElementById("accInput").value;
  if(val.trim()!==""){
    push(ref(db,"accounts"),val);
    document.getElementById("accInput").value="";
  }
};

window.importAcc=function(){
  document.getElementById("bulk").value.split("\n").forEach(a=>{
    if(a.trim()!=="") push(ref(db,"accounts"),a);
  });
  document.getElementById("bulk").value="";
};

window.delAcc=function(id){
  remove(ref(db,"accounts/"+id));
};

</script>
</body>
</html>
